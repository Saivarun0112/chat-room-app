<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chat App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f953c6 0%, #b91d73 25%, #4776e6 55%, #8e54e9 80%, #f953c6 100%);
      background-size: 300% 300%;
      animation: bgShift 8s ease infinite;
      overflow: hidden;
    }
    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: .35; pointer-events: none; z-index: 0; }
    .blob1 { width: 320px; height: 320px; background: #ff6fd8; top: -80px; left: -80px; animation: float1 7s ease-in-out infinite; }
    .blob2 { width: 260px; height: 260px; background: #3bffdc; bottom: -60px; right: -60px; animation: float2 9s ease-in-out infinite; }
    .blob3 { width: 180px; height: 180px; background: #ffe45e; top: 40%; left: 60%; animation: float1 11s ease-in-out infinite reverse; }
    @keyframes float1 { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-30px) scale(1.08)} }
    @keyframes float2 { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(25px) scale(1.06)} }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(400px, 92vw);
      background: #1a0533;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.4), 0 0 0 1.5px rgba(255,255,255,.15);
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity:0; transform: scale(.8) translateY(40px); }
      to   { opacity:1; transform: scale(1)  translateY(0); }
    }

    /* Top banner */
    .banner {
      background: linear-gradient(135deg, #fc466b, #3f5efb);
      padding: 36px 28px 28px;
      text-align: center;
      position: relative;
    }
    .banner-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 10px;
      animation: bounce 2.2s ease-in-out infinite;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.3));
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .banner h1 {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -.5px;
      text-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .banner p {
      font-size: 14px;
      color: rgba(255,255,255,.65);
      margin-top: 5px;
      font-weight: 600;
    }

    /* Body */
    .body {
      padding: 28px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Big action buttons */
    .action-btn {
      width: 100%;
      padding: 16px 20px;
      border-radius: 18px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform .2s, box-shadow .2s, filter .2s;
      position: relative;
      overflow: hidden;
    }
    .action-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background .2s;
    }
    .action-btn:hover::after { background: rgba(255,255,255,.08); }
    .action-btn:hover { transform: translateY(-2px) scale(1.02); }
    .action-btn:active { transform: scale(.97); }

    .btn-create {
      background: linear-gradient(135deg, #f953c6, #ff6b6b, #ffc837);
      color: #fff;
      box-shadow: 0 6px 24px rgba(249,83,198,.45);
    }
    .btn-create:hover { box-shadow: 0 10px 32px rgba(249,83,198,.6); filter: brightness(1.07); }

    .btn-join {
      background: linear-gradient(135deg, #4776e6, #8e54e9);
      color: #fff;
      box-shadow: 0 6px 24px rgba(142,84,233,.45);
    }
    .btn-join:hover { box-shadow: 0 10px 32px rgba(142,84,233,.6); filter: brightness(1.07); }

    .btn-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,.22);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .btn-text { text-align: left; }
    .btn-text span { display: block; font-size: 11.5px; font-weight: 600; opacity: .75; margin-top: 1px; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      color: rgba(255,255,255,.2); font-size: 12px; font-weight: 700; letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px; background: rgba(255,255,255,.1);
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,0,30,.7);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a0533;
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 28px;
      padding: 30px 26px;
      width: min(360px, 90vw);
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-title {
      font-size: 20px; font-weight: 900; color: #fff;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-title span { font-size: 24px; }

    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 12.5px; font-weight: 700; color: rgba(255,255,255,.5); letter-spacing: .5px; text-transform: uppercase; }
    .input-group input {
      background: rgba(255,255,255,.08);
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 14px;
      padding: 12px 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      color: #fff; outline: none;
      transition: all .2s;
      caret-color: #ffe45e;
    }
    .input-group input::placeholder { color: rgba(255,255,255,.3); }
    .input-group input:focus {
      border-color: rgba(255,255,255,.45);
      background: rgba(255,255,255,.13);
      box-shadow: 0 0 0 4px rgba(255,255,255,.06);
    }

    .modal-hint { font-size: 12px; color: rgba(255,255,255,.3); font-weight: 600; }

    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .modal-cancel {
      flex: 1; padding: 13px; border-radius: 14px;
      background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.6); font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 800; cursor: pointer; transition: all .2s;
    }
    .modal-cancel:hover { background: rgba(255,255,255,.13); }

    .modal-confirm {
      flex: 2; padding: 13px; border-radius: 14px; border: none;
      font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
      color: #fff; cursor: pointer; transition: all .2s;
    }
    .modal-confirm.create { background: linear-gradient(135deg, #f953c6, #ff6b6b, #ffc837); box-shadow: 0 4px 18px rgba(249,83,198,.4); }
    .modal-confirm.join   { background: linear-gradient(135deg, #4776e6, #8e54e9); box-shadow: 0 4px 18px rgba(142,84,233,.4); }
    .modal-confirm:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .modal-confirm:active { transform: scale(.96); }

    .error-msg { font-size: 12.5px; color: #ff6b6b; font-weight: 700; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">
  <div class="banner">
    <span class="banner-icon">💬</span>
    <h1>Message Cheai</h1>
    <p>Create or join a room to start chatting</p>
  </div>
  <div class="body">
    <button class="action-btn btn-create" onclick="openModal('create')">
      <div class="btn-icon">🚀</div>
      <div class="btn-text">
        Start Chat
        <span>Start a new chat</span>
      </div>
    </button>
    <div class="divider">OR</div>
    <button class="action-btn btn-join" onclick="openModal('join')">
      <div class="btn-icon">🔑</div>
      <div class="btn-text">
        Join Chat
        <span>Enter a room code to join</span>
      </div>
    </button>
  </div>
</div>

<!-- Create Room Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-title"><span>🚀</span> Create a Room</div>
    <div class="input-group">
      <label>Room Number</label>
      <input type="number" id="createRoomInput" placeholder="Enter a number (10–99)" min="10" max="99">
    </div>
    <div class="input-group">
      <label>Your Name</label>
      <input type="text" id="createNameInput" placeholder="What's your name?">
    </div>
    <div class="modal-hint">Room number must be between 10 and 99</div>
    <div class="error-msg" id="createError">⚠️ Room must be between 10 and 99</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('create')">Cancel</button>
      <button class="modal-confirm create" onclick="confirmCreate()">Create Room 🎉</button>
    </div>
  </div>
</div>

<!-- Join Room Modal -->
<div class="modal-overlay" id="joinModal">
  <div class="modal">
    <div class="modal-title"><span>🔑</span> Join a Room</div>
    <div class="input-group">
      <label>Room Code</label>
      <input type="text" id="joinRoomInput" placeholder="Enter room code">
    </div>
    <div class="input-group">
      <label>Your Name</label>
      <input type="text" id="joinNameInput" placeholder="What's your name?">
    </div>
    <div class="error-msg" id="joinError">⚠️ Please fill in both fields</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('join')">Cancel</button>
      <button class="modal-confirm join" onclick="confirmJoin()">Join Room 🚀</button>
    </div>
  </div>
</div>

<script>
  function openModal(type) {
    document.getElementById(type + 'Modal').classList.add('open');
    setTimeout(() => document.getElementById(type === 'create' ? 'createRoomInput' : 'joinRoomInput').focus(), 100);
  }
  function closeModal(type) {
    document.getElementById(type + 'Modal').classList.remove('open');
    document.getElementById(type + 'Error').classList.remove('show');
  }

  // Close on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  });

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('createModal').classList.contains('open')) confirmCreate();
      if (document.getElementById('joinModal').classList.contains('open')) confirmJoin();
    }
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
    }
  });

  function confirmCreate() {
    const room = document.getElementById('createRoomInput').value;
    const name = document.getElementById('createNameInput').value.trim();
    const err  = document.getElementById('createError');
    if (room < 10 || room > 99 || room === '') {
      err.textContent = '⚠️ Room must be between 10 and 99';
      err.classList.add('show'); return;
    }
    if (!name) {
      err.textContent = '⚠️ Please enter your name';
      err.classList.add('show'); return;
    }
    err.classList.remove('show');
    localStorage.setItem('room', room);
    localStorage.setItem('name', name);
    window.location = 'chat.html';
  }

  function confirmJoin() {
    const room = document.getElementById('joinRoomInput').value.trim();
    const name = document.getElementById('joinNameInput').value.trim();
    const err  = document.getElementById('joinError');
    if (!room || !name) {
      err.classList.add('show'); return;
    }
    err.classList.remove('show');
    localStorage.setItem('room', room);
    localStorage.setItem('name', name);
    window.location = 'chat.html';
  }
</script>

</body>
</html>
