<!DOCTYPE html>
<html>

<head>

<title>Room Chat</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-mart@latest/css/emoji-mart.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a5af9,#5ec6ff);
}

.chat{
width:420px;
height:620px;
background:white;
border-radius:25px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.header{
background:linear-gradient(135deg,#ff4d79,#6a5af9);
padding:20px;
color:white;
font-weight:bold;
text-align:center;
font-size:20px;
}

#chatBox{
flex:1;
padding:15px;
overflow-y:auto;
background:#f5f5f5;
}

.msg{
padding:10px 14px;
border-radius:12px;
margin-bottom:10px;
max-width:70%;
word-wrap:break-word;
}

.me{
background:#6a5af9;
color:white;
margin-left:auto;
}

.other{
background:white;
border:1px solid #ddd;
}

.inputArea{
display:flex;
padding:10px;
background:#eee;
align-items:center;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
}

.inputArea button{
margin-left:5px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#6a5af9;
color:white;
cursor:pointer;
}

#emojiPicker{
position:absolute;
bottom:90px;
display:none;
}

</style>

</head>

<body>

<div class="chat">

<div class="header">
Mine 💝
</div>

<div id="chatBox"></div>

<div class="inputArea">

<button onclick="toggleEmoji()">😀</button>

<input id="msg" placeholder="Fast ga type cheai...">

<button onclick="sendMessage()">Send</button>

</div>

<div id="emojiPicker"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>

<script>

const socket = io()

const room = localStorage.getItem("room")
let name = localStorage.getItem("name")

if(!name){
name = prompt("Enter your name")
localStorage.setItem("name",name)
}

socket.emit("joinRoom",{room})

socket.on("previousMessages",(messages)=>{
messages.forEach(msg=>{
displayMessage(msg)
})
})

socket.on("message",(data)=>{
displayMessage(data)
})

function sendMessage(){

const input=document.getElementById("msg")
const message=input.value.trim()

if(message==="") return

const data={
room:room,
name:name,
message:message
}

socket.emit("chatMessage",data)

input.value=""

}

function displayMessage(data){

const div=document.createElement("div")

if(data.name===name){
div.classList.add("msg","me")
}else{
div.classList.add("msg","other")
}

div.innerHTML="<b>"+data.name+"</b><br>"+data.message

document.getElementById("chatBox").appendChild(div)

document.getElementById("chatBox").scrollTop=
document.getElementById("chatBox").scrollHeight

}

document.getElementById("msg").addEventListener("keydown",function(e){

if(e.key==="Enter"){
e.preventDefault()
sendMessage()
}

})

/* EMOJI PICKER */

const picker = new EmojiMart.Picker({
onEmojiSelect: emoji => {
document.getElementById("msg").value += emoji.native
}
})

document.getElementById("emojiPicker").appendChild(picker)

function toggleEmoji(){

const box=document.getElementById("emojiPicker")

if(box.style.display==="block"){
box.style.display="none"
}else{
box.style.display="block"
}

}

</script>

</body>
</html>
