<!DOCTYPE html>
<html lang="en">
<head>
  <title>Room Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f953c6 0%, #b91d73 25%, #4776e6 55%, #8e54e9 80%, #f953c6 100%);
      background-size: 300% 300%;
      animation: bgShift 8s ease infinite;
      overflow: hidden;
    }
    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: .35; pointer-events: none; z-index: 0; }
    .blob1 { width: 320px; height: 320px; background: #ff6fd8; top: -80px; left: -80px; animation: float1 7s ease-in-out infinite; }
    .blob2 { width: 260px; height: 260px; background: #3bffdc; bottom: -60px; right: -60px; animation: float2 9s ease-in-out infinite; }
    .blob3 { width: 180px; height: 180px; background: #ffe45e; top: 40%; left: 60%; animation: float1 11s ease-in-out infinite reverse; }
    @keyframes float1 { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-30px) scale(1.08)} }
    @keyframes float2 { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(25px) scale(1.06)} }

    .app {
      position: relative;
      z-index: 1;
      width: min(460px, 96vw);
      height: min(700px, 95vh);
      display: flex;
      flex-direction: column;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.35), 0 0 0 1.5px rgba(255,255,255,.25);
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity:0; transform: scale(.85) translateY(40px); }
      to   { opacity:1; transform: scale(1)   translateY(0); }
    }

    /* Header */
    .header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #fc466b, #3f5efb);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      border: 2.5px solid rgba(255,255,255,.6);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 18px; color: #fff;
      flex-shrink: 0;
    }
    .header-title { flex: 1; font-weight: 800; font-size: 18px; color: #fff; letter-spacing: -.2px; }
    .btn-delete {
      background: rgba(255,255,255,.18);
      border: 1.5px solid rgba(255,255,255,.35);
      color: #fff; border-radius: 20px; padding: 6px 14px;
      font-family: 'Nunito', sans-serif; font-size: 12.5px; font-weight: 700;
      cursor: pointer; transition: all .2s;
    }
    .btn-delete:hover { background: rgba(255,255,255,.3); transform: scale(1.04); }
    .btn-delete:active { transform: scale(.95); }

    /* Chat */
    #chatBox {
      flex: 1; overflow-y: auto; padding: 18px 16px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
      background: linear-gradient(180deg, rgba(252,70,107,.08) 0%, rgba(63,94,251,.06) 100%), #1a0533;
    }
    #chatBox::-webkit-scrollbar { width: 4px; }
    #chatBox::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

    .message {
      display: flex; flex-direction: column; max-width: 78%;
      animation: msgPop .3s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes msgPop {
      from { opacity:0; transform: scale(.8) translateY(10px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .message.mine   { align-self: flex-end;   align-items: flex-end; }
    .message.theirs { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 17px; border-radius: 22px;
      font-size: 14.5px; line-height: 1.5; word-break: break-word; font-weight: 600;
    }
    .message.mine .bubble {
      background: linear-gradient(135deg, #f953c6, #ff6b6b, #ffc837);
      color: #fff; border-bottom-right-radius: 6px;
      box-shadow: 0 6px 24px rgba(249,83,198,.4);
    }
    .message.theirs .bubble {
      background: linear-gradient(135deg, #4776e6, #8e54e9);
      color: #fff; border-bottom-left-radius: 6px;
      box-shadow: 0 6px 24px rgba(142,84,233,.4);
    }
    /* Emoji-only bubble gets bigger */
    .bubble.emoji-only { background: transparent !important; box-shadow: none !important; font-size: 40px; padding: 4px 8px; }

    .msg-meta { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 4px; padding: 0 5px; font-weight: 600; }

    /* Emoji picker */
    .emoji-picker {
      background: #1a0533;
      border-top: 1.5px solid rgba(255,255,255,.1);
      padding: 10px 14px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .emoji-picker.open { display: flex; }
    .emoji-picker::-webkit-scrollbar { width: 3px; }
    .emoji-picker::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }

    .emoji-btn {
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px;
      width: 40px; height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, background .15s;
      flex-shrink: 0;
    }
    .emoji-btn:hover { background: rgba(255,255,255,.18); transform: scale(1.2); }
    .emoji-btn:active { transform: scale(.9); }

    /* Input row */
    .input-row {
      padding: 10px 14px 13px;
      background: linear-gradient(135deg, #3f5efb, #fc466b);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }

    .btn-emoji-toggle {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 1.5px solid rgba(255,255,255,.35);
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
    }
    .btn-emoji-toggle:hover { background: rgba(255,255,255,.3); transform: scale(1.08); }
    .btn-emoji-toggle.active { background: rgba(255,228,94,.3); border-color: #ffe45e; }

    #msg {
      flex: 1;
      background: rgba(255,255,255,.15);
      border: 2px solid rgba(255,255,255,.3);
      border-radius: 50px; padding: 11px 18px;
      font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600;
      color: #fff; outline: none; transition: all .2s;
      caret-color: #ffe45e;
    }
    #msg::placeholder { color: rgba(255,255,255,.5); }
    #msg:focus { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.6); box-shadow: 0 0 0 4px rgba(255,255,255,.1); }

    .btn-send {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, #ffe45e, #ff6b6b);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform .18s, box-shadow .18s;
      box-shadow: 0 4px 18px rgba(255,228,94,.5);
    }
    .btn-send:hover { transform: scale(1.1) rotate(8deg); box-shadow: 0 6px 24px rgba(255,107,107,.6); }
    .btn-send:active { transform: scale(.9); }
    .btn-send svg { width: 19px; height: 19px; fill: #fff; filter: drop-shadow(0 1px 2px rgba(0,0,0,.3)); }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; pointer-events: none;
    }
    .empty-icon { font-size: 52px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .empty-text { font-size: 15px; font-weight: 700; color: rgba(255,255,255,.4); }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="app">

  <div class="header">
    <div class="header-avatar">🫂</div>
    <div class="header-title">Mine</div>
    <button class="btn-delete" onclick="deleteChat()">🗑 Delete Chat</button>
  </div>

  <div id="chatBox">
    <div class="empty-state">
      <div class="empty-icon">👋</div>
      <div class="empty-text">No messages yet — break the ice!</div>
    </div>
  </div>

  <!-- Emoji Picker Panel -->
  <div class="emoji-picker" id="emojiPicker"></div>

  <div class="input-row">
    <button class="btn-emoji-toggle" id="emojiToggle" onclick="togglePicker()" title="Emoji">😊</button>
    <input id="msg" placeholder="Type something awesome…" autocomplete="off" onkeydown="if(event.key==='Enter') sendMessage()">
    <button class="btn-send" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script src="/socket.io/socket.io.js" onerror="void 0"></script>
<script src="script.js" onerror="void 0"></script>
<script>
  const EMOJIS = [
    '😀','😂','🤣','😍','🥰','😎','🤩','🥳','😜','🤪',
    '😭','😤','🤬','🥺','😱','🤯','🤔','🫠','😴','🤑',
    '👍','👎','👏','🙌','🤝','✌️','🤞','💪','🫶','❤️',
    '🧡','💛','💚','💙','💜','🖤','🤍','💔','❤️‍🔥','💯',
    '🔥','✨','🎉','🎊','🥂','🍕','🍔','🍟','🌮','🍜',
    '🎮','🎵','🎶','🏆','⚽','🏀','🎯','🚀','🌈','🦄',
    '😺','🐶','🦊','🐸','🐼','🌸','🌻','🍀','🌙','⭐',
    '😏','🫡','🤭','🫢','😬','🙃','😇','🥹','🫨','💀',
  ];

  // Build emoji grid
  const picker = document.getElementById('emojiPicker');
  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = em;
    btn.title = em;
    btn.onclick = () => insertEmoji(em);
    picker.appendChild(btn);
  });

  function insertEmoji(em) {
    const input = document.getElementById('msg');
    const pos = input.selectionStart;
    const val = input.value;
    input.value = val.slice(0, pos) + em + val.slice(pos);
    input.selectionStart = input.selectionEnd = pos + em.length;
    input.focus();
  }

  function togglePicker() {
    const p = document.getElementById('emojiPicker');
    const btn = document.getElementById('emojiToggle');
    p.classList.toggle('open');
    btn.classList.toggle('active');
  }

  // Close picker when clicking outside
  document.addEventListener('click', e => {
    const picker = document.getElementById('emojiPicker');
    const toggle = document.getElementById('emojiToggle');
    if (!picker.contains(e.target) && e.target !== toggle) {
      picker.classList.remove('open');
      toggle.classList.remove('active');
    }
  });

  function isEmojiOnly(str) {
    // Strip emoji characters and whitespace; if nothing left, it's emoji-only
    const clean = str.replace(/(\p{Emoji_Presentation}|\p{Extended_Pictographic}|\s)/gu, '');
    return clean.length === 0 && str.trim().length > 0;
  }

  function sendMessage() {
    const input = document.getElementById('msg');
    const text = input.value.trim();
    if (!text) return;
    const chatBox = document.getElementById('chatBox');
    const empty = chatBox.querySelector('.empty-state');
    if (empty) empty.remove();
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const emojiOnly = isEmojiOnly(text);
    const msg = document.createElement('div');
    msg.className = 'message mine';
    msg.innerHTML = `<div class="bubble${emojiOnly ? ' emoji-only' : ''}">${escapeHtml(text)}</div><div class="msg-meta">You · ${time}</div>`;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = '';
    input.focus();
  }

  function deleteChat() {
    document.getElementById('chatBox').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎉</div>
        <div class="empty-text">No messages yet — break the ice!</div>
      </div>`;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
